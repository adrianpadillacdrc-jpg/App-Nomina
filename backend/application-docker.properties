# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# POSTGRESQL DATABASE
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/numadb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:numanomina2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================
# MONGODB
# ==========================================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://root:root123@mongodb:27017/numa_mongo?authSource=admin}

# ==========================================
# LOGGING
# ==========================================
logging.level.com.nomina.numa=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# SWAGGER / OPENAPI
# ==========================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# ==========================================
# DEVTOOLS (deshabilitado en Docker)
# ==========================================
spring.devtools.restart.enabled=false

# ==========================================